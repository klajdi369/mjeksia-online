services:
  app:
    build:
      context: .
    working_dir: /app
    volumes:
      - .:/app
      - pnpm-store:/root/.local/share/pnpm/store
      - node_modules:/app/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    environment:
      - EXPO_NO_TELEMETRY=1
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
    command: pnpm start -- --host lan --port 8081

volumes:
  pnpm-store:
  node_modules:
